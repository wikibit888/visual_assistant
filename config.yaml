# Visual Assistant v0.1 · 配置基线（契约·配置；Live 版）
# 规则：阈值/模型名/契约值进此处；密钥进 .env；代码中禁硬编码。
# 数值来源 = PRD（标注 §）；本会话决策项标注 [决策]。
schema_version: "0.1"

# ── 模型供应商（密钥在 .env，此处仅模型名/参数；可切换）──
providers:
  gemini:
    api_base: "https://generativelanguage.googleapis.com"
    api_key_env: GEMINI_API_KEY
  openai:                          # Live 备选（gpt-realtime）；vision 不用
    api_base: "https://api.openai.com/v1"
    api_key_env: OPENAI_API_KEY

# ── 角色 → 供应商+模型 绑定（[决策] Gemini Live 主 + OpenAI 备；deepseek 因无 realtime 退役）──
roles:
  live:                            # Live 大脑：ASR+推理+TTS 一体 + function calling + proactive
    provider: gemini               # [决策] 主家 gemini；切 OpenAI 改 provider: openai
    model: gemini-3.1-flash-live-preview   # §3；OpenAI 备 = gpt-realtime
    voice: Kore                    # 预置音色
  vision:                          # 工具视觉识别（多模态单帧 → {text/verdict/description, confidence}）
    provider: gemini               # §3；deepseek 无多模态，故 vision 固定 gemini
    model: gemini-2.5-flash

# ── Live 会话 / 工具执行体（确定性·绿层；PRD §1.4 / §4.1 / §5）──
session:
  audio_in_sample_rate: 16000      # §3 PCM 上送 16k
  audio_out_sample_rate: 24000     # §3 PCM 播放 24k
  vision_budget_per_problem: 3     # §5 抓帧超预算封顶（识题1 + 批改≤2）；工具执行层计数
  vision_retry_max: 1              # [决策] PRD 未给值，缺省 1
  first_response_target_ms: 1500   # §5 首响目标（监测口径，非硬阈；填充语/复述盖往返）
  frame_timeout_ms: 4000           # [决策] 单帧往返超时：客户端漏回 frame.response 时不让模型泵死锁（PRD §5 抓帧确定性绿层）
  live_ping_interval_ms: 20000     # [方案A] Live ws keepalive ping 间隔（0=禁 ping，靠数据流/TCP 探活）
  live_ping_timeout_ms: 60000      # [方案A] 等 pong 容忍上限：默认 20s→60s，扛 China→Google 实时流抖动（PRD §5）

# ── 语音轮次 / 客户端闸门（确定性·蓝层；前端阈值经 config.push 下发，前端不自带魔数）──
voice:
  default_voice_mode: ptt          # §4.3 开场默认对讲机（ptt | free）
  half_duplex_gate: true           # §5 自由对话/坐姿播报期半双工 gate 麦克风（消自激）
  barge_in_min_ms: 300             # §4.4 自由对话判打断的最小连续人声
  playback_drain_quiet_ms: 120     # §5 判「播报真结束」的去抖静默窗：环形缓冲须连续空 ≥ 此时长才算 drained，吸收流式块间抖动（前端 worklet 据此与采样率算量子数，不拿魔数）

# ── 坐姿守护（PRD §3.2 / §3.2.2；100% 端侧，零云调用）──
posture:
  hunchback_hold_ms: 30000         # [决策] = 30s（PRD §3.2/§11 已对齐 30s）；回归更长只改此处
  reminder_cooldown_ms: 60000      # §3.2 同类提醒 60s 冷却
  release_scope: active_problem    # §3.2.2 放行 = mode==learning 或 active_problem!=null（客户端裁）
  thoracic_kyphosis_deg: 30        # 双条件之一：胸椎后凸角阈（占位·真机标定·改此一处生效，前端 posture 从 config.push 读）
  head_forward_ratio: 0.15         # 双条件之一：头部前伸/与桌面距离（占位·真机标定·改此一处生效，前端 posture 从 config.push 读）
  gap_min_silence_ms: 1500         # §4.2 客户端 gap 闸门：静默≥此值才算缝隙，才注入坐姿 alert

# ── 天气（weather_get；Open-Meteo 无 key；PRD §3 / §5）──
weather:
  provider: open-meteo
  api_base: "https://api.open-meteo.com/v1/forecast"
  cache_ttl_hours: 1               # 按城市+小时缓存
  fallback_city: "Shanghai"        # §5 定位失败静默回落
  fallback_lat: 31.2304
  fallback_lon: 121.4737
